# Default config path: ~/.config/autossh/config.toml
# Use --config to specify a different path.
# Each [[connections]] block starts one ssh process with any number of -L / -R / -D forwards.
# Authentication uses ordinary ~/.ssh/config (keys, agent, Host aliases).
#
# keepalive / retry are SHARED by every connection and live at the top level.
# Editing them here propagates to all connections on the next supervisor reload.
#
# Optional password fallback: when `password` is set, `BatchMode=yes` is dropped
# and `sshpass -e` feeds the password non-interactively. Requires `sshpass` on PATH.
# `user` (optional) prepends `user@` to `host` unless `host` already contains `@`.

# keepalive: ServerAliveInterval / ServerAliveCountMax / ConnectTimeout (seconds).
keepalive = { interval = 360, count_max = 10, connect_timeout = 15 }

# retry: initial / maximum / stable (seconds).
# Optional. Defaults: 1 s initial, max 60 s, reset delay after 60 s stable connection.
# retry = { initial_seconds = 1, maximum_seconds = 60, stable_seconds = 60 }

[[connections]]
name = "home-server"              # unique connection identifier
# description = "home lab gateway" # optional GUI note
host = "amd"
# user = "alice"                  # optional; overrides user in user@host
# password = "s3cret"             # optional; enables password auth via sshpass
# port = 2222                       # optional; SSH defaults to 22
forwards = [
  # L/R: [bind:]port:host:port — listen side and target side swap per mode.
  # Add enabled = false to retain a mapping without starting it.
  { mode = "local",   forward = "0.0.0.0:8080:127.0.0.1:8080" },  # client → server
  { mode = "remote",  forward = "1081:192.168.31.1:7890" },        # server → client
  # D: [bind:]port — local SOCKS, no target (SOCKS client picks it).
  { mode = "dynamic", forward = "1080" },                          # loopback only
]

# Optional extra SSH arguments. Each item is one argument.
# extra_args = ["-i", "/home/alice/.ssh/id_ed25519"]

